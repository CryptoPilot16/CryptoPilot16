<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 80" width="860" height="80">
  <rect width="860" height="80" fill="#080808"/>

  <!-- 16 projects -->
  <text x="0" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#d4d4d4">16</text>
  <text x="0" y="66" font-family="'Courier New', monospace" font-size="12" fill="#555">projects</text>

  <!-- 441K lines of code -->
  <text x="150" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="bold">
    <tspan fill="#d4d4d4">441</tspan><tspan fill="#00e5a0">K</tspan>
  </text>
  <text x="150" y="66" font-family="'Courier New', monospace" font-size="12" fill="#555">lines of code</text>

  <!-- 8 languages -->
  <text x="355" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#26A5E4">8</text>
  <text x="355" y="66" font-family="'Courier New', monospace" font-size="12" fill="#555">languages</text>

  <!-- ∞ deploys -->
  <text x="490" y="44" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#c084fc">∞</text>
  <text x="490" y="66" font-family="'Courier New', monospace" font-size="12" fill="#555">deploys</text>
</svg>
